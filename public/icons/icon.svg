<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="star" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#ffe082"/>
      <stop offset="70%" stop-color="#ffd54f"/>
      <stop offset="100%" stop-color="#ffb300"/>
    </radialGradient>
    <radialGradient id="planet" cx="35%" cy="35%" r="75%">
      <stop offset="0%" stop-color="#cfd8dc"/>
      <stop offset="100%" stop-color="#607d8b"/>
    </radialGradient>
  </defs>

  <!-- Deep-space background (matches the sim's default background) -->
  <rect width="512" height="512" fill="#1a1a2e"/>

  <!-- Faint orbital path (tilted ellipse) -->
  <ellipse cx="256" cy="256" rx="212" ry="74" fill="none"
           stroke="#546e7a" stroke-width="5" opacity="0.55"
           transform="rotate(-22 256 256)"/>

  <!-- Host star -->
  <circle cx="256" cy="256" r="132" fill="url(#star)"/>

  <!-- Transiting planet (in front of the star disk) -->
  <circle cx="312" cy="198" r="36" fill="url(#planet)"/>
</svg>
